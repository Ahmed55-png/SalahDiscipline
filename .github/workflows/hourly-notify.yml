name: Hourly notify (ayah + prayer reminders)

# Hobby Vercel plan only allows ONE cron per day, so we drive the
# hourly schedule from GitHub Actions instead. The workflow simply
# pings our /api/cron/notify endpoint with the shared CRON_SECRET.
#
# GitHub Actions is free for public repos (and 2,000 min/month for
# private). A single curl takes <5s, so 24×30 = 720 runs/month is
# well under any limit.

on:
  schedule:
    # At minute 0 of every hour, UTC. GitHub schedules are best-effort
    # and may drift by a few minutes during low load — that's fine for
    # prayer reminders, which we deliver within the matching hour.
    - cron: '0 * * * *'
  workflow_dispatch: {} # allow manual trigger from the Actions tab

jobs:
  ping:
    runs-on: ubuntu-latest
    timeout-minutes: 2
    steps:
      - name: Hit Vercel cron endpoint
        run: |
          curl --fail --silent --show-error \
            -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}" \
            -H "User-Agent: GitHubActions-Cron" \
            "https://salah-discipline-vvii.vercel.app/api/cron/notify"
