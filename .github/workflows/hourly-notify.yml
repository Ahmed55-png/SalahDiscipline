name: Prayer notify (every 5 minutes)

# We can't run a Vercel cron more than once a day on the Hobby plan,
# so the actual prayer reminder schedule lives here. GitHub Actions
# schedules drift a bit but are accurate enough for ±5 min prayer
# windows.
#
# Free for public repos; ~288 runs/day × ~5s each is well under the
# 2000 min/month private-repo budget too.

on:
  schedule:
    - cron: '*/5 * * * *'
  workflow_dispatch: {}

# Concurrency: never overlap runs — if a previous run is somehow still
# going when the next fires, the new one waits (and skip-stale could
# be added later).
concurrency:
  group: prayer-notify
  cancel-in-progress: false

jobs:
  ping:
    runs-on: ubuntu-latest
    timeout-minutes: 2
    steps:
      - name: Hit Vercel cron endpoint
        run: |
          response=$(curl --fail --silent --show-error \
            -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}" \
            -H "User-Agent: GitHubActions-Cron" \
            "https://salah-discipline-vvii.vercel.app/api/cron/notify")
          echo "Response: $response"
