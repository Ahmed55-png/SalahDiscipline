name: Prayer notify (every 10 minutes)

# Vercel Hobby cron is limited to daily runs, so the actual reminder
# schedule lives here. GitHub Actions schedules can drift a bit, but they
# are accurate enough for prayer and ayah reminder checks.
#
# Free for public repos; about 144 runs/day x ~5s each is well under the
# 2000 min/month private-repo budget too.

on:
  schedule:
    - cron: '*/10 * * * *'
  workflow_dispatch: {}

# Concurrency: never overlap runs. If a previous run is somehow still going
# when the next fires, the new one waits.
concurrency:
  group: prayer-notify
  cancel-in-progress: false

jobs:
  ping:
    runs-on: ubuntu-latest
    timeout-minutes: 2
    steps:
      - name: Hit Vercel cron endpoint
        run: |
          response=$(curl --fail --silent --show-error \
            -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}" \
            -H "User-Agent: GitHubActions-Cron" \
            "https://salah-discipline-vvii.vercel.app/api/cron/notify")
          echo "Response: $response"
